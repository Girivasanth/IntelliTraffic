<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Intersection Monitor</title>
    <style>
        /* (Same CSS as before - copy from previous response) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            background: #4CAF50;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-badge.alert {
            background: #f44336;
            animation: pulse 1.5s infinite;
        }

        .status-badge.warning {
            background: #ff9800;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .timestamp {
            font-size: 14px;
            color: #ddd;
        }

        .data-source {
            font-size: 12px;
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 15px;
            margin-left: 10px;
        }

        .ambulance-alert {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .ambulance-icon {
            font-size: 40px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .ambulance-details {
            flex: 1;
        }

        .ambulance-details h3 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .ambulance-details p {
            font-size: 14px;
            opacity: 0.9;
        }

        .intersection-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .lane-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .lane-card:hover {
            transform: translateY(-5px);
        }

        .lane-header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lane-name {
            font-size: 24px;
            font-weight: bold;
        }

        .lane-direction {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        .lane-content {
            padding: 20px;
        }

        .phase-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid;
            transition: all 0.3s ease;
        }

        .phase-card.green {
            border-left-color: #4CAF50;
            background: linear-gradient(to right, #f8f9fa, #e8f5e9);
        }

        .phase-card.red {
            border-left-color: #f44336;
            background: linear-gradient(to right, #f8f9fa, #ffebee);
        }

        .phase-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .phase-name {
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .signal-state {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .signal-state.green {
            background: #4CAF50;
        }

        .signal-state.red {
            background: #f44336;
        }

        .vehicle-counts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .vehicle-item {
            text-align: center;
            padding: 8px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .vehicle-icon {
            font-size: 20px;
            display: block;
            margin-bottom: 5px;
        }

        .vehicle-type {
            font-size: 11px;
            color: #666;
            text-transform: capitalize;
        }

        .vehicle-count {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }

        .phase-total {
            margin-top: 10px;
            text-align: right;
            font-size: 14px;
            color: #666;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .summary-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .summary-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
        }

        .summary-unit {
            font-size: 12px;
            color: #999;
            margin-left: 5px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .reconnect-btn {
            background: white;
            color: #f44336;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .reconnect-btn:hover {
            background: #f5f5f5;
        }

        @media (max-width: 768px) {
            .intersection-grid {
                grid-template-columns: 1fr;
            }
            
            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .vehicle-counts {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span>🚦</span>
                Traffic Intersection Monitor
            </h1>
            <div>
                <span class="status-badge" id="connectionStatus">
                    <span class="status-dot">●</span>
                    Connecting...
                </span>
                <span class="data-source" id="dataSource">redis</span>
                <span class="timestamp" id="timestamp">Loading...</span>
            </div>
        </div>

        <div id="ambulanceAlert" style="display: none;"></div>
        <div id="intersectionGrid" class="intersection-grid"></div>
        <div id="summaryGrid" class="summary-grid"></div>
    </div>

    <script>
        // Lane directions mapping
        const LANE_DIRECTIONS = {
            'A': 'UP',
            'B': 'DOWN',
            'C': 'LEFT',
            'D': 'RIGHT'
        };

        // Vehicle icons mapping
        const VEHICLE_ICONS = {
            'two_wheelers': '🏍️',
            'cars': '🚗',
            'trucks': '🚚',
            'heavy': '🚛'
        };

        // State
        let lastData = null;
        let pollInterval = 2000; // Poll every 2 seconds
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 5;

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            monitorTraffic();
        });

        async function monitorTraffic() {
            showLoading();
            
            // Start polling
            setInterval(async () => {
                await fetchTrafficData();
            }, pollInterval);
            
            // Initial fetch
            await fetchTrafficData();
        }

        async function fetchTrafficData() {
            try {
                const response = await fetch('/api/traffic');
                const result = await response.json();
                
                if (result.success) {
                    updateDisplay(result.data, result.source);
                    reconnectAttempts = 0; // Reset on success
                } else {
                    handleError(result.error);
                }
            } catch (error) {
                console.error('Polling error:', error);
                handleError('Failed to connect to server');
            }
        }

        function handleError(message) {
            reconnectAttempts++;
            
            if (reconnectAttempts > maxReconnectAttempts) {
                showError(`Connection lost. Please check if server is running.`, true);
            } else {
                showError(`${message}. Retrying... (${reconnectAttempts}/${maxReconnectAttempts})`);
            }
            
            updateConnectionStatus(false, 'error');
        }

        function updateDisplay(data, source) {
            // Update timestamp
            document.getElementById('timestamp').textContent = 
                new Date().toLocaleTimeString();
            
            // Update data source
            document.getElementById('dataSource').textContent = source || 'redis';
            
            // Update connection status
            updateConnectionStatus(true, 'connected');
            
            // Update ambulance alerts
            updateAmbulanceAlert(data.ambulance_alerts);
            
            // Update lane displays
            updateLaneDisplays(data.lanes);
            
            // Update summary
            updateSummary(data.lanes);
        }

        function updateAmbulanceAlert(alerts) {
            const alertContainer = document.getElementById('ambulanceAlert');
            
            if (alerts && Object.keys(alerts).length > 0) {
                const alertHtml = Object.entries(alerts).map(([lane, alert]) => {
                    const time = new Date(alert.timestamp * 1000).toLocaleTimeString();
                    return `
                        <div class="ambulance-alert">
                            <div class="ambulance-icon">🚑</div>
                            <div class="ambulance-details">
                                <h3>🚨 EMERGENCY VEHICLE IN LANE ${lane} 🚨</h3>
                                <p>Direction: ${LANE_DIRECTIONS[lane] || 'Unknown'} | 
                                   Count: ${alert.count} | 
                                   Time: ${time}</p>
                            </div>
                        </div>
                    `;
                }).join('');
                
                alertContainer.innerHTML = alertHtml;
                alertContainer.style.display = 'block';
                
                // Update header status
                document.getElementById('connectionStatus').classList.add('alert');
            } else {
                alertContainer.style.display = 'none';
                document.getElementById('connectionStatus').classList.remove('alert');
            }
        }

        function updateLaneDisplays(lanes) {
            const grid = document.getElementById('intersectionGrid');
            
            const laneHtml = Object.entries(lanes).map(([laneName, laneData]) => `
                <div class="lane-card">
                    <div class="lane-header">
                        <span class="lane-name">Lane ${laneName}</span>
                        <span class="lane-direction">${LANE_DIRECTIONS[laneName] || 'Unknown'}</span>
                    </div>
                    <div class="lane-content">
                        ${Object.entries(laneData.phases).map(([phaseName, phaseData]) => {
                            const total = Object.values(phaseData.vehicles || {}).reduce((a, b) => a + b, 0);
                            const signalClass = (phaseData.signal_state || 'RED').toLowerCase();
                            
                            return `
                                <div class="phase-card ${signalClass}">
                                    <div class="phase-header">
                                        <span class="phase-name">${phaseName}</span>
                                        <span class="signal-state ${signalClass}">${phaseData.signal_state || 'RED'}</span>
                                    </div>
                                    <div class="vehicle-counts">
                                        ${Object.entries(phaseData.vehicles || {}).map(([type, count]) => `
                                            <div class="vehicle-item">
                                                <span class="vehicle-icon">${VEHICLE_ICONS[type] || '🚙'}</span>
                                                <span class="vehicle-count">${count}</span>
                                                <span class="vehicle-type">${type.replace('_', ' ')}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="phase-total">
                                        Total: ${total} vehicles
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
            
            grid.innerHTML = laneHtml;
        }

        function updateSummary(lanes) {
            const summaryGrid = document.getElementById('summaryGrid');
            
            // Calculate totals
            let totalVehicles = 0;
            let totalTwoWheelers = 0;
            let totalCars = 0;
            let totalTrucks = 0;
            let totalHeavy = 0;
            
            Object.values(lanes).forEach(lane => {
                Object.values(lane.phases).forEach(phase => {
                    totalVehicles += Object.values(phase.vehicles || {}).reduce((a, b) => a + b, 0);
                    totalTwoWheelers += phase.vehicles?.two_wheelers || 0;
                    totalCars += phase.vehicles?.cars || 0;
                    totalTrucks += phase.vehicles?.trucks || 0;
                    totalHeavy += phase.vehicles?.heavy || 0;
                });
            });
            
            const summaryHtml = `
                <div class="summary-card">
                    <div class="summary-label">Total Vehicles</div>
                    <div class="summary-value">${totalVehicles}<span class="summary-unit">veh</span></div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Two Wheelers</div>
                    <div class="summary-value">${totalTwoWheelers}<span class="summary-unit">🏍️</span></div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Cars</div>
                    <div class="summary-value">${totalCars}<span class="summary-unit">🚗</span></div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Trucks/Heavy</div>
                    <div class="summary-value">${totalTrucks + totalHeavy}<span class="summary-unit">🚛</span></div>
                </div>
            `;
            
            summaryGrid.innerHTML = summaryHtml;
        }

        function updateConnectionStatus(connected, status = 'connected') {
            const statusEl = document.getElementById('connectionStatus');
            if (connected) {
                statusEl.innerHTML = '<span class="status-dot">●</span> Connected';
                statusEl.classList.remove('alert', 'warning');
                statusEl.classList.add('connected');
            } else {
                if (status === 'error') {
                    statusEl.innerHTML = '<span class="status-dot">●</span> Connection Error';
                    statusEl.classList.add('alert');
                } else {
                    statusEl.innerHTML = '<span class="status-dot">●</span> Disconnected';
                    statusEl.classList.add('warning');
                }
            }
        }

        function showLoading() {
            const grid = document.getElementById('intersectionGrid');
            grid.innerHTML = `
                <div class="loading" style="grid-column: span 2;">
                    <div class="spinner"></div>
                    <p>Connecting to traffic monitor...</p>
                </div>
            `;
        }

        function showError(message, showReconnect = false) {
            const container = document.querySelector('.container');
            
            // Remove existing error
            const existingError = document.querySelector('.error');
            if (existingError) {
                existingError.remove();
            }
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            
            if (showReconnect) {
                errorDiv.innerHTML = `
                    ${message}
                    <button class="reconnect-btn" onclick="window.location.reload()">
                        Reconnect
                    </button>
                `;
            } else {
                errorDiv.textContent = message;
            }
            
            container.insertBefore(errorDiv, container.firstChild);
            
            // Auto remove after 5 seconds if not showing reconnect
            if (!showReconnect) {
                setTimeout(() => {
                    if (errorDiv.parentNode) {
                        errorDiv.remove();
                    }
                }, 5000);
            }
        }
    </script>
</body>
</html>
